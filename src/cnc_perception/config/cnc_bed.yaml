# CNC machining bed definition in cnc_bed_frame (meters).
# Origin: bottom-left corner of the machining bed, Z=0 on the top surface.
cnc_bed:
  length_m: 0.250
  width_m: 0.180
  origin_corner: bottom_left
  axis_convention:
    x: along_bed_length
    y: along_bed_width
    z: up_from_bed_surface

# Bed reference marker (recommended: ArUco outside the machining zone).
# Print DICT_4X4_50 id 0 — see PROJECT_GUIDE.md for placement.
reference_marker:
  type: aruco
  dictionary: DICT_4X4_50
  marker_id: 0
  marker_size_m: 0.040
  # Marker center is placed at bed origin (0, 0, 0). X/Y axes align with bed axes.
  placement: center_at_origin

# Target placement for the workpiece center on the bed (meters).
target_placement:
  x_m: 0.100
  y_m: 0.100
  z_m: 0.0
  yaw_deg: 0.0
  tolerance:
    xy_mm: 2.0
    z_mm: 1.5
    yaw_deg: 3.0

# Optional STL mesh for RViz (provide your CAD export path).
workpiece_mesh:
  enabled: false
  stl_path: "package://cnc_perception/meshes/workpiece.stl"
  scale: 1.0
