# CNC machining bed definition in cnc_bed_frame (meters).
# Origin: bottom-left corner of the machining bed, Z=0 on the top surface.
cnc_bed:
  length_m: 0.284
  width_m: 0.180
  origin_corner: bottom_left
  axis_convention:
    x: along_bed_length   # bottom-left -> bottom-right (284 mm)
    y: along_bed_width    # bottom-left -> top-left (180 mm)
    z: up_from_bed_surface

# ArUco marker at bed origin (print with step00_generate_aruco_marker.py).
reference_marker:
  type: aruco
  dictionary: DICT_4X4_50
  marker_id: 0
  marker_size_m: 0.048
  placement: center_at_origin
  # Rotate marker print if its +X is not aligned with bed +X (try 0, 90, -90).
  marker_to_bed_yaw_deg: 0.0
  # ArUco +Y points down on the print; bed +Y points into the bed — keep true.
  flip_marker_y: true

# Target placement for step06 placement check (optional RViz marker).
target_placement:
  show_target_marker: false
  x_m: 0.100
  y_m: 0.100
  z_m: 0.0
  yaw_deg: 0.0
  tolerance:
    xy_mm: 2.0
    z_mm: 1.5
    yaw_deg: 3.0

workpiece_mesh:
  enabled: false
  stl_path: "package://cnc_perception/meshes/workpiece.stl"
  scale: 1.0
