# CNC bed frame for Genmitsu 3018-PRO (meters).
# Origin: FRONT-LEFT corner of the metal bed (ArUco marker center at calibration).
# Matches labels on your bed: +X right, +Y toward back of machine.
cnc_bed:
  length_m: 0.284
  width_m: 0.180
  origin_corner: front_left
  axis_convention:
    x: along_front_edge_to_the_right
    y: along_left_edge_to_the_back
    z: up_from_bed_surface

reference_marker:
  type: aruco
  dictionary: DICT_4X4_50
  marker_id: 0
  marker_size_m: 0.048
  placement: center_at_origin
  # See SETUP_AND_CALIBRATION_GUIDE.md for marker print orientation.
  # After placing marker, tune only if RViz bed axes do not match real bed edges.
  marker_to_bed_yaw_deg: 0.0
  flip_marker_y: true

target_placement:
  show_target_marker: false
  x_m: 0.100
  y_m: 0.100
  z_m: 0.0
  yaw_deg: 0.0
  tolerance:
    xy_mm: 2.0
    z_mm: 1.5
    yaw_deg: 3.0

workpiece_mesh:
  enabled: false
  stl_path: "package://cnc_perception/meshes/workpiece.stl"
  scale: 1.0
