# CNC bed frame for Genmitsu 3018-PRO (meters).
# Origin: FRONT-LEFT corner of the metal bed (ArUco marker center at calibration).
# Matches labels on your bed: +X right, +Y toward back of machine.
cnc_bed:
  length_m: 0.284
  width_m: 0.180
  origin_corner: front_left
  axis_convention:
    x: along_front_edge_to_the_right
    y: along_left_edge_to_the_back
    z: up_from_bed_surface

# Reported X/Y in step05 are shifted so 0,0 matches the metal front-left corner.
# Calibration uses the ArUco center as cnc_bed_frame origin; metal corner is +24,+24 mm.
coordinate_reporting:
  subtract_from_x_mm: 24.0
  subtract_from_y_mm: 24.0

reference_marker:
  type: aruco
  dictionary: DICT_4X4_50
  marker_id: 0
  marker_size_m: 0.048
  placement: center_at_origin
  # See SETUP_AND_CALIBRATION_GUIDE.md for marker print orientation.
  # After placing marker, tune only if RViz bed axes do not match real bed edges.
  marker_to_bed_yaw_deg: 0.0
  flip_marker_y: true

target_placement:
  show_target_marker: true
  x_m: 0.100
  y_m: 0.100
  z_m: 0.0
  yaw_deg: 0.0
  # Pass when measured pose is within +/- tolerance of target x_m, y_m, yaw_deg.
  tolerance:
    x_mm: 0.3
    y_mm: 0.4
    yaw_deg: 0.7

workpiece_mesh:
  enabled: false
  stl_path: "package://cnc_perception/meshes/workpiece.stl"
  scale: 1.0
