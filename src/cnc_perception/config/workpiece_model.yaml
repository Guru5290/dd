# Physical dimensions of the plain square workpiece (meters).
workpiece:
  width_m: 0.050
  length_m: 0.050
  thickness_m: 0.010

object_frame:
  origin: center_top_face
  x_axis: width
  y_axis: length
  z_axis: thickness

template:
  enabled: false
  path: "package://cnc_perception/config/templates/workpiece_edge_template.png"
  match_threshold: 0.72

# Detection tuned for 50 mm stock on Genmitsu 3018 with side-mounted camera.
detection:
  blur_kernel_size: 5
  adaptive_block_size: 21
  adaptive_c: 3
  canny_low: 35
  canny_high: 110
  min_contour_area_px: 600
  max_contour_area_px: 120000
  aspect_ratio_tolerance: 0.30
  polygon_epsilon_ratio: 0.03
  min_solidity: 0.65
  min_interior_contrast: 4.0
  try_inverted_threshold: true
  try_otsu_threshold: true

size_filter:
  min_area_ratio: 0.0005
  max_area_ratio: 0.85

pose:
  use_ippe_for_planar: true
  publish_debug_image: true
  pose_smoothing_alpha: 0.35
