# Physical dimensions of the plain square workpiece (meters).
workpiece:
  width_m: 0.050
  length_m: 0.050
  thickness_m: 0.010

object_frame:
  origin: center_top_face
  x_axis: width
  y_axis: length
  z_axis: thickness

template:
  enabled: false
  path: "package://cnc_perception/config/templates/workpiece_edge_template.png"
  match_threshold: 0.72

# Tuned for 50 mm x 50 mm stock on a small CNC bed.
detection:
  blur_kernel_size: 5
  adaptive_block_size: 21
  adaptive_c: 3
  canny_low: 70       #30   # has been changed to try and eliminate shadow detections.
  canny_high: 150     #100
  min_contour_area_px: 2000   #400
  max_contour_area_px: 15000   #500000
  aspect_ratio_tolerance: 0.10  #0.25
  polygon_epsilon_ratio: 0.025
  min_solidity: 0.75
  try_inverted_threshold: true
  try_otsu_threshold: true

size_filter:
  min_area_ratio: 0.001
  max_area_ratio: 0.80

pose:
  use_ippe_for_planar: true
  publish_debug_image: true
  pose_smoothing_alpha: 0.35
