# Physical dimensions of the plain square workpiece (meters).
workpiece:
  width_m: 0.050
  length_m: 0.050
  thickness_m: 0.010

object_frame:
  origin: center_top_face
  x_axis: width
  y_axis: length
  z_axis: thickness

template:
  enabled: false
  path: "package://cnc_perception/config/templates/workpiece_edge_template.png"
  match_threshold: 0.72

# Detection for 50 mm stock, ELP side-mounted tilted camera, open metal bed.
detection:
  blur_kernel_size: 7
  use_clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_size: 8
  adaptive_block_size: 31
  adaptive_c: 4
  canny_low: 30
  canny_high: 100
  min_contour_area_px: 250
  max_contour_area_px: 200000
  aspect_ratio_tolerance: 0.35
  polygon_epsilon_ratio: 0.035
  min_solidity: 0.55
  min_interior_contrast: 0.0
  try_inverted_threshold: true
  try_otsu_threshold: true
  use_relaxed_fallback: true
  # Full bed visible — no ROI crop. Enable only to mask a fixed clutter region.
  roi:
    enabled: false
    x_min_ratio: 0.0
    y_min_ratio: 0.0
    x_max_ratio: 0.72 #1.0
    y_max_ratio: 1.0  

size_filter:
  min_area_ratio: 0.0005 #0.0002
  # Reject huge merged part+shadow blobs (50 mm part is usually <25% of image).
  max_area_ratio: 0.08 #0.30

pose:
  use_ippe_for_planar: true
  publish_debug_image: true
  pose_smoothing_alpha: 0.25
  assume_flat_on_bed: true
  bed_pose_smoothing_alpha: 0.90
  bed_yaw_smoothing_alpha: 0.96
  # Prefer corner assignments consistent with previous yaw (reduces lighting jumps).
  square_yaw_stability_weight: 1.5
