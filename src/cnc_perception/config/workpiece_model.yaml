# Physical dimensions of the plain square workpiece (meters).
workpiece:
  width_m: 0.050
  length_m: 0.050
  thickness_m: 0.010

object_frame:
  origin: center_top_face
  x_axis: width
  y_axis: length
  z_axis: thickness

template:
  enabled: false
  path: "package://cnc_perception/config/templates/workpiece_edge_template.png"
  match_threshold: 0.72

# Detection for 50 mm stock, ELP side-mounted tilted camera, open metal bed.
detection:
  blur_kernel_size: 5
  adaptive_block_size: 21
  adaptive_c: 2
  canny_low: 30
  canny_high: 100
  min_contour_area_px: 250
  max_contour_area_px: 200000
  aspect_ratio_tolerance: 0.35
  polygon_epsilon_ratio: 0.035
  min_solidity: 0.55
  min_interior_contrast: 0.0
  try_inverted_threshold: true
  try_otsu_threshold: true
  use_relaxed_fallback: true
  # Crop right side of image (floor outside CNC) — keep enabled for your camera view.
  roi:
    enabled: true
    x_min_ratio: 0.0
    y_min_ratio: 0.0
    x_max_ratio: 0.72
    y_max_ratio: 1.0

size_filter:
  min_area_ratio: 0.0005
  max_area_ratio: 0.08

pose:
  use_ippe_for_planar: true
  publish_debug_image: true
  # Camera-frame solvePnP smoothing (light).
  pose_smoothing_alpha: 0.20
  # Flat stock on the bed: force tilt=0 and Z=thickness in cnc_bed_frame.
  assume_flat_on_bed: true
  # Bed-frame X/Y/yaw smoothing (higher = less jitter in RViz).
  bed_pose_smoothing_alpha: 0.88
