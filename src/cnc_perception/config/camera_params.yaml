# ELP-USB GS1200P01 global shutter camera parameters for usb_cam (V4L2).
# Verify supported modes: v4l2-ctl --device=/dev/video0 --list-formats-ext
# Global shutter cameras benefit from fixed exposure to reduce motion blur.
/**:
  ros__parameters:
    video_device: "/dev/video0"
    framerate: 60.0
    io_method: "mmap"
    frame_id: "camera_link"
    pixel_format: "mjpeg"
    av_device_format: "YUV422P"
    image_width: 1280
    image_height: 720
    camera_name: "elp_gs1200"
    camera_info_url: "package://cnc_perception/config/camera_info.yaml"
    brightness: -1
    contrast: -1
    saturation: -1
    sharpness: -1
    gain: -1
    auto_white_balance: false
    white_balance: 4600
    autoexposure: false
    exposure: 120
    autofocus: false
    focus: -1
